name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - name: Linux x64
            platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - name: Windows x64
            platform: windows-latest
            args: ''
            rust_target: ''

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' }}
      HAS_APPLE_ID_NOTARIZATION: ${{ secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      HAS_APPLE_API_NOTARIZATION: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && (secrets.APPLE_API_KEY_P8 != '' || secrets.APPLE_API_KEY_BASE64 != '') }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            build.keychain

          cert_info="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -n 1 || true)"
          if [ -z "$cert_info" ]; then
            cert_info="$(security find-identity -v -p codesigning build.keychain | head -n 1 || true)"
          fi
          cert_id="$(echo "$cert_info" | awk -F'"' '{print $2}')"
          if [ -z "$cert_id" ]; then
            echo "No usable Apple code signing identity found in imported certificate."
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"

      - name: Use Apple signing identity
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE == 'true'
        run: |
          node -e '
            const fs = require("fs");
            const path = "src-tauri/tauri.conf.json";
            const config = JSON.parse(fs.readFileSync(path, "utf8"));
            config.bundle.macOS.signingIdentity = process.env.APPLE_SIGNING_IDENTITY;
            fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");
          '

      - name: Prepare App Store Connect API key
        if: runner.os == 'macOS' && env.HAS_APPLE_API_NOTARIZATION == 'true'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          if [ -n "$APPLE_API_KEY_BASE64" ]; then
            echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$api_key_path"
          else
            printf '%s' "$APPLE_API_KEY_P8" > "$api_key_path"
          fi
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Show Apple distribution mode
        if: runner.os == 'macOS'
        run: |
          if [ "${HAS_APPLE_CERTIFICATE}" = "true" ]; then
            echo "macOS Developer ID signing enabled."
          else
            echo "macOS Developer ID signing disabled; using local ad-hoc signing fallback."
          fi

          if [ "${HAS_APPLE_ID_NOTARIZATION}" = "true" ] || [ "${HAS_APPLE_API_NOTARIZATION}" = "true" ]; then
            echo "macOS notarization enabled."
          else
            echo "macOS notarization disabled; add Apple notarization secrets before cutting a public release."
          fi

      - name: Require notarized macOS release configuration
        if: runner.os == 'macOS' && (env.HAS_APPLE_CERTIFICATE != 'true' || (env.HAS_APPLE_ID_NOTARIZATION != 'true' && env.HAS_APPLE_API_NOTARIZATION != 'true'))
        run: |
          echo "macOS releases require Developer ID signing plus Apple notarization secrets."
          echo "Add APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, KEYCHAIN_PASSWORD, and either:"
          echo "- APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID"
          echo "- APPLE_API_KEY, APPLE_API_ISSUER, APPLE_API_KEY_P8 or APPLE_API_KEY_BASE64"
          exit 1

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Burnmeter ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  normalize-release-assets:
    name: Normalize release assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Rename assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG#v}"

          rename_asset() {
            local from="$1"
            local to="$2"
            local id

            id="$(gh api "repos/$REPO/releases/tags/$TAG" \
              --jq ".assets[] | select(.name == \"$from\") | .id" | head -n 1)"

            if [ -n "$id" ]; then
              gh api -X PATCH "repos/$REPO/releases/assets/$id" -f name="$to" >/dev/null
            fi
          }

          delete_asset() {
            local name="$1"
            local id

            id="$(gh api "repos/$REPO/releases/tags/$TAG" \
              --jq ".assets[] | select(.name == \"$name\") | .id" | head -n 1)"

            if [ -n "$id" ]; then
              gh api -X DELETE "repos/$REPO/releases/assets/$id" >/dev/null
            fi
          }

          rename_asset "Burnmeter_${version}_aarch64.dmg" "Burnmeter-${TAG}-macOS-Apple-Silicon.dmg"
          rename_asset "Burnmeter_${version}_x64.dmg" "Burnmeter-${TAG}-macOS-Intel.dmg"
          delete_asset "Burnmeter_aarch64.app.tar.gz"
          delete_asset "Burnmeter_x64.app.tar.gz"
          rename_asset "Burnmeter_${version}_amd64.AppImage" "Burnmeter-${TAG}-Linux-x64.AppImage"
          rename_asset "Burnmeter_${version}_amd64.deb" "Burnmeter-${TAG}-Linux-x64.deb"
          rename_asset "Burnmeter-${version}-1.x86_64.rpm" "Burnmeter-${TAG}-Linux-x64.rpm"
          rename_asset "Burnmeter_${version}_x64-setup.exe" "Burnmeter-${TAG}-Windows-x64-setup.exe"
          rename_asset "Burnmeter_${version}_x64_en-US.msi" "Burnmeter-${TAG}-Windows-x64.msi"
